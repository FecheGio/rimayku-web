<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel editorial — Rimayku</title>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms@0.158.0/dist/sveltia-cms.js"></script>
  <script>
  CMS.init({
    config: {
      load_config_file: false,
      backend: {
        name: 'github',
        repo: 'FecheGio/rimayku-web',
        branch: 'master',
        base_url: 'https://rimayku-web.vercel.app',
        auth_endpoint: 'auth',
      },
      media_folder: 'media',
      public_folder: '/media',
      locale: 'es',
      collections: [
        {
          name: 'novedades',
          label: 'Novedades',
          files: [{
            label: 'Novedades',
            name: 'novedades',
            file: 'content/novedades.json',
            format: 'json',
            fields: [{
              label: 'Noticias',
              name: 'items',
              widget: 'list',
              summary: '{{fields.titulo}}',
              fields: [
                { label: 'Tipo', name: 'tipo', widget: 'select',
                  options: [
                    { label: 'Lanzamiento', value: 'lanzamiento' },
                    { label: 'Evento',      value: 'evento' },
                    { label: 'Nota editorial', value: 'editorial' }
                  ]
                },
                { label: 'Fecha',   name: 'fecha',     widget: 'string', hint: 'Ej: Abril 2025' },
                { label: 'Título',  name: 'titulo',    widget: 'string' },
                { label: 'Texto',   name: 'excerpt',   widget: 'text' },
                { label: 'Pie (autor o lugar)', name: 'autor_pie', widget: 'string' },
                { label: 'Noticia destacada (ocupa más espacio)', name: 'destacada', widget: 'boolean', default: false }
              ]
            }]
          }]
        },
        {
          name: 'libros',
          label: 'Libros',
          files: [{
            label: 'Catálogo',
            name: 'catalogo',
            file: 'content/libros.json',
            format: 'json',
            fields: [{
              label: 'Libros',
              name: 'items',
              widget: 'list',
              summary: '{{fields.titulo}} — {{fields.autor}}',
              fields: [
                { label: 'Título',   name: 'titulo', widget: 'string' },
                { label: 'Autor/a',  name: 'autor',  widget: 'string' },
                { label: 'Colección', name: 'coleccion', widget: 'select',
                  options: [
                    { label: 'Voces del monte',      value: 'voces-del-monte' },
                    { label: 'La palabra prestada',  value: 'la-palabra-prestada' },
                    { label: 'Decir primero',        value: 'decir-primero' }
                  ]
                },
                { label: 'Año',              name: 'anio',        widget: 'string' },
                { label: 'Marcar como nuevo', name: 'nuevo',      widget: 'boolean', default: false },
                { label: 'Color de portada', name: 'color_fondo', widget: 'color', default: '#111111' },
                { label: 'Color del texto',  name: 'color_texto', widget: 'color', default: '#FAFAFA' }
              ]
            }]
          }]
        },
        {
          name: 'autores',
          label: 'Autores',
          files: [{
            label: 'Autores',
            name: 'autores',
            file: 'content/autores.json',
            format: 'json',
            fields: [{
              label: 'Autores',
              name: 'items',
              widget: 'list',
              summary: '{{fields.nombre}}',
              fields: [
                { label: 'Nombre completo', name: 'nombre',    widget: 'string' },
                { label: 'Iniciales',       name: 'iniciales', widget: 'string', hint: '2 letras, ej: LM' },
                { label: 'Colección', name: 'coleccion', widget: 'select',
                  options: [
                    { label: 'Voces del monte',      value: 'voces-del-monte' },
                    { label: 'La palabra prestada',  value: 'la-palabra-prestada' },
                    { label: 'Decir primero',        value: 'decir-primero' }
                  ]
                },
                { label: 'Biografía', name: 'bio', widget: 'text' },
                { label: 'Libros', name: 'libros', widget: 'list',
                  summary: '{{fields.titulo}}',
                  fields: [
                    { label: 'Título', name: 'titulo', widget: 'string' },
                    { label: 'Año',    name: 'anio',   widget: 'string' }
                  ]
                }
              ]
            }]
          }]
        }
      ]
    }
  });
  </script>
</body>
</html>
